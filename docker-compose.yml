services:
  copilot-api:
    image: ghcr.io/ericc-ch/copilot-api:latest
    container_name: copilot-api
    command: start --port 4141
    environment:
      - GH_TOKEN=${GH_TOKEN}  # Your GitHub token for Copilot API
    volumes:
      - copilot-data:/root/.local/share/copilot-api
    restart: unless-stopped
    # Only accessible from within Docker network, not exposed to host
    expose:
      - "4141"

  shadow-gate:
    build: .
    container_name: shadow-gate
    ports:
      - "4142:4142"
    environment:
      - PORT=4142
      - UPSTREAM=http://copilot-api:4141
      - ALLOWED_USERS=${ALLOWED_USERS}  # Comma-separated GitHub usernames
      - VERBOSE=${VERBOSE:-false}
    depends_on:
      - copilot-api
    restart: unless-stopped

volumes:
  copilot-data:
